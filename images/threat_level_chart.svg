<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 22px sans-serif; fill:#111827; }
    .label { font: 16px sans-serif; fill:#111827; }
    .bar { stroke:#1f2937; stroke-width:1; }
    .axis { stroke:#111827; stroke-width:2; }
  </style>
  <text class="title" x="20" y="40">Threat Level Distribution</text>
  <rect class="bar" x="120" y="100" width="140" height="40" fill="#dc2626"/>
  <rect class="bar" x="120" y="160" width="110" height="40" fill="#f97316"/>
  <rect class="bar" x="120" y="220" width="90" height="40" fill="#eab308"/>
  <rect class="bar" x="120" y="280" width="60" height="40" fill="#22c55e"/>
  <rect class="bar" x="120" y="340" width="35" height="40" fill="#38bdf8"/>
  <text class="label" x="20" y="130">CRITICAL (5)</text>
  <text class="label" x="20" y="190">HIGH (4)</text>
  <text class="label" x="20" y="250">MEDIUM (3)</text>
  <text class="label" x="20" y="310">LOW (2)</text>
  <text class="label" x="20" y="370">INFO (1)</text>
  <text class="label" x="270" y="120">45%</text>
  <text class="label" x="240" y="180">25%</text>
  <text class="label" x="220" y="240">15%</text>
  <text class="label" x="200" y="300">10%</text>
  <text class="label" x="175" y="360">5%</text>
  <path class="axis" d="M 110 430 L 560 430"/>
  <path class="axis" d="M 110 80 L 110 430"/>
</svg>