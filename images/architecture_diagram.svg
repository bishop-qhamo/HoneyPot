<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill:#f4f7fb; stroke:#2563eb; stroke-width:2; rx:14; }
    .title { font: bold 20px sans-serif; fill:#1f2937; }
    .label { font: 16px sans-serif; fill:#111827; }
    .arrow { fill:none; stroke:#2563eb; stroke-width:3; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="box" x="50" y="50" width="320" height="180"/>
  <text class="title" x="70" y="80">Honeypot Services</text>
  <text class="label" x="70" y="110">SSH / Telnet / HTTP</text>
  <text class="label" x="70" y="135">FTP / RDP</text>
  <text class="label" x="70" y="160">Protocol handlers + logging</text>

  <rect class="box" x="420" y="260" width="320" height="180"/>
  <text class="title" x="440" y="290">Threat Engine</text>
  <text class="label" x="440" y="320">Pattern matching</text>
  <text class="label" x="440" y="345">Threat scoring</text>
  <text class="label" x="440" y="370">Intelligence correlation</text>

  <rect class="box" x="790" y="50" width="320" height="180"/>
  <text class="title" x="810" y="80">Centralized Logging</text>
  <text class="label" x="810" y="110">Logstash</text>
  <text class="label" x="810" y="135">Elasticsearch</text>
  <text class="label" x="810" y="160">Kibana</text>

  <rect class="box" x="790" y="260" width="320" height="180"/>
  <text class="title" x="810" y="290">Dashboard</text>
  <text class="label" x="810" y="320">Flask API</text>
  <text class="label" x="810" y="345">Real-time charts</text>
  <text class="label" x="810" y="370">Session analytics</text>

  <path class="arrow" d="M 370 140 L 420 140"/>
  <path class="arrow" d="M 610 120 L 790 120"/>
  <path class="arrow" d="M 610 320 L 790 320"/>
  <path class="arrow" d="M 610 260 L 790 260"/>
  <path class="arrow" d="M 420 350 L 420 260"/>
  <path class="arrow" d="M 420 360 L 420 440"/>
  <text class="label" x="460" y="240">Analyzed logs/events</text>
</svg>