input {
  file {
    path => "/var/log/honeypot/honeypot.log"
    start_position => "beginning"
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}"
      negate => true
      what => "previous"
    }
  }
  
  tcp {
    port => 5000
    codec => json
  }
  
  udp {
    port => 5000
    codec => json
  }
}

filter {
  # Parse honeypot log lines
  if [message] =~ "Connection from" or [message] =~ "SSH\|Telnet\|HTTP\|FTP\|RDP" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{WORD:logger} - %{LOGLEVEL:log_level} - \[%{NUMBER:conn_id}\] %{GREEDYDATA:message_content}"
      }
    }
    
    # Extract IP addresses
    grok {
      match => {
        "message_content" => "from %{IP:client_ip}:%{NUMBER:client_port:int}"
      }
    }
    
    # Extract service type
    grok {
      match => {
        "message_content" => "(?<service>SSH|Telnet|HTTP|FTP|RDP)"
      }
    }
    
    # Parse threat levels
    if [message_content] =~ "threat detected" {
      grok {
        match => {
          "message_content" => "level: %{NUMBER:threat_level:int}"
        }
      }
      mutate {
        add_field => { "event_type" => "threat_detected" }
      }
    }
  }
  
  # Add timestamp
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }
  
  # Add source information
  mutate {
    add_field => { "source" => "honeypot" }
    add_field => { "honeypot_type" => "t-pot-style" }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "honeypot-%{+YYYY.MM.dd}"
  }
  
  # Also write to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
